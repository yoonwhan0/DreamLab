[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  framework = "vite"
  command = "npm run dev:vite"
  targetPort = 5173
  port = 8888
  autoLaunch = false

# SPA catch-all보다 위에 — /api/* 는 Netlify Function으로
[[redirects]]
  from = "/api/interpret-dream"
  to = "/.netlify/functions/interpret-dream"
  status = 200
  force = true

[[redirects]]
  from = "/api/story-access"
  to = "/.netlify/functions/story-access"
  status = 200
  force = true

[[redirects]]
  from = "/api/register-story-views"
  to = "/.netlify/functions/register-story-views"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin-import-dreams"
  to = "/.netlify/functions/admin-import-dreams"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin-delete-dreams"
  to = "/.netlify/functions/admin-delete-dreams"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  # Firebase 웹 SDK는 클라이언트 공개 설정 — dist·SW 번들에 포함됨
  SECRETS_SCAN_OMIT_PATHS = "dist/**,dist-admin/**,public/firebase-messaging-sw.js"
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY,VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_PROJECT_ID,VITE_FIREBASE_STORAGE_BUCKET,VITE_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_APP_ID"

[functions]
  node_bundler = "esbuild"

[functions."interpret-dream"]
  timeout = 26
