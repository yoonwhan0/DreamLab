[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  framework = "vite"
  command = "npm run dev:vite"
  targetPort = 5173
  port = 8888
  autoLaunch = false

# SPA catch-all보다 위에 — /api/* 는 Netlify Function으로
[[redirects]]
  from = "/api/interpret-dream"
  to = "/.netlify/functions/interpret-dream"
  status = 200
  force = true

[[redirects]]
  from = "/api/story-access"
  to = "/.netlify/functions/story-access"
  status = 200
  force = true

[[redirects]]
  from = "/api/register-story-views"
  to = "/.netlify/functions/register-story-views"
  status = 200
  force = true

[[redirects]]
  from = "/api/create-story-unlock-order"
  to = "/.netlify/functions/create-story-unlock-order"
  status = 200
  force = true

[[redirects]]
  from = "/api/confirm-story-unlock-payment"
  to = "/.netlify/functions/confirm-story-unlock-payment"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[functions."interpret-dream"]
  timeout = 26
